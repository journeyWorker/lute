# Scenario test (`lute test`) — the interrogation hub.
# Seeds the ledger clue as a fact so the fact-guarded `pressLedger` choice is
# eligible, forces the hub visit sequence (press then leave), and checks that
# the choice's writes land and the `<match on="run.suspectFocus">` routes to
# the blake arm.
file: ../scenes/interview.lute
facts:
  - "foundClue(ledger)"
choose:
  interrogate: [pressLedger, leave]
expect:
  exit: complete
  transcriptContains:
    - "These numbers were bled dry. Explain them."
    - "Blake keeps surfacing. A thread worth pulling."
  state:
    run.suspectFocus: blake
    run.leadStrength: 1

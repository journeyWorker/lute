# Scenario test (`lute test`) — accuse the WRONG suspect.
# Same truth (`run.trueKiller: blake`) but a different forced `accuse` choice,
# so `run.accused` diverges and the FAILURE ending fires. Contrast with
# accuse-correctly.test.yaml — same document, two forced choices.
file: ../scenes/confrontation.lute
state:
  run.trueKiller: blake
choose:
  accuse: accuseCass
expect:
  exit: complete
  transcriptContains:
    - "The wrong suspect walks free. Somewhere, the real one exhales."
    - "I got it wrong. The file stays open."
  state:
    run.accused: cass

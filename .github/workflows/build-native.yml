name: Build Native (Test Only)

# Scoped to S0's acceptance bar: macOS arm64 + Linux x64 gnu only. Both
# matrix rows build on a host that natively matches the target triple
# (macos-14 runners are Apple Silicon; ubuntu-latest runners are x86_64),
# so no cross-compilation toolchain (zig / cargo-zigbuild) is needed for
# either row — that machinery only becomes necessary once a target is
# added whose triple doesn't match any available runner's native arch.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  safety:
    name: Release workflow safety check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Cross-workflow drift guard: fails the moment this workflow's build
      # matrix / env drifts from publish.yml's, or from the platform
      # package manifests. Dependency-free (stdlib python3).
      - name: Check release workflow safety
        run: python3 scripts/check-release-workflow-safety.py

  build:
    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    needs: safety
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-14
            target: aarch64-apple-darwin
            package_dir: core-darwin-arm64
            binary_ext: ""
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_dir: core-linux-x64
            binary_ext: ""
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            package_dir: core-win32-x64
            binary_ext: ".exe"

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: lute-cli-${{ matrix.settings.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build lute-cli binary
        run: cargo build --release -p lute-cli --target ${{ matrix.settings.target }}

      - name: Strip binary
        if: matrix.settings.binary_ext == ''
        run: strip "target/${{ matrix.settings.target }}/release/lute"

      - name: Stage into platform package (local verification only — not committed)
        shell: bash
        run: |
          BIN="lute${{ matrix.settings.binary_ext }}"
          mkdir -p "packages/${{ matrix.settings.package_dir }}/bin"
          cp "target/${{ matrix.settings.target }}/release/$BIN" "packages/${{ matrix.settings.package_dir }}/bin/$BIN"
          chmod +x "packages/${{ matrix.settings.package_dir }}/bin/$BIN"
          "packages/${{ matrix.settings.package_dir }}/bin/$BIN" --version

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lute-binary-${{ matrix.settings.target }}
          path: target/${{ matrix.settings.target }}/release/lute${{ matrix.settings.binary_ext }}
          if-no-files-found: error

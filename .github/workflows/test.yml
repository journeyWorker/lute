name: Test

# `offline` is the baseline `cargo test --workspace` gate — zero network,
# runs on every PR touching Rust sources. `launcher-typecheck` compiles
# the `@lute-lang/lute` JS launcher (packages/cli) under `tsc --noEmit` so a type
# regression in the platform-detection / binary-resolution logic is caught
# without a native build.

on:
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "packages/cli/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  offline:
    name: cargo test --workspace (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: lute-test-offline-cargo-${{ hashFiles('Cargo.lock') }}

      - name: cargo test --workspace
        run: cargo test --workspace

  launcher-typecheck:
    name: typecheck @lute-lang/lute launcher (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck launcher
        run: bunx tsc --noEmit -p packages/cli/tsconfig.json
